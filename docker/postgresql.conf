# Tuning for small VPS (1-2 GB RAM)
# These override PostgreSQL defaults which are too conservative

listen_addresses = '*'
max_connections = 40

# Memory — assume ~1 GB total RAM for the VPS, ~256 MB for postgres container
shared_buffers = 64MB
effective_cache_size = 192MB
work_mem = 4MB
maintenance_work_mem = 32MB

# WAL
wal_buffers = 4MB
checkpoint_completion_target = 0.9

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_min_duration_statement = 1000
