services:
  postgres:
    image: postgres:16-alpine
    env_file: [.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  next:
    build: .
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["3000"]
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      next:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    restart: unless-stopped

  api-cron-patch-daily-0700:
    image: curlimages/curl:8.5.0
    restart: unless-stopped
    depends_on: [next]
    volumes:
      - ./docker/cron:/cron:ro
    command: ["/bin/sh", "/cron/patch_daily_0700_utc.sh"]

  api-cron-put-hourly:
    image: curlimages/curl:8.5.0
    restart: unless-stopped
    depends_on: [next]
    volumes:
      - ./docker/cron:/cron:ro
    command: ["/bin/sh", "/cron/put_hourly_utc.sh"]

volumes:
  pgdata:
